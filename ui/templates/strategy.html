<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Optimus9 — Strategy</title>
<style>
  :root { --bg:#1e2127; --panel:#262b33; --line:#3a414d; --text:#d8dee9; --muted:#8a93a3; --accent:#5e9cd6; --ok:#6ab04c; }
  * { box-sizing:border-box; }
  body { margin:0; font:14px/1.5 -apple-system,Segoe UI,Roboto,sans-serif; background:var(--bg); color:var(--text); }
  header { padding:12px 18px; border-bottom:1px solid var(--line); display:flex; align-items:center; gap:14px; }
  header h1 { font-size:16px; margin:0; font-weight:600; }
  #status { font-size:13px; color:var(--muted); margin-left:auto; }
  .wrap { display:flex; gap:14px; padding:14px; height:calc(100vh - 110px); }
  .left { flex:0 0 75%; overflow:auto; }
  .right { flex:1; display:flex; flex-direction:column; }
  .right label { font-size:12px; color:var(--muted); margin-bottom:6px; display:block; }
  #notes { flex:1; resize:none; background:var(--panel); color:var(--text); border:1px solid var(--line);
           border-radius:8px; padding:12px; font:13px/1.5 ui-monospace,Menlo,monospace; }
  .card { background:var(--panel); border:1px solid var(--line); border-radius:8px; margin-bottom:14px; overflow:hidden; }
  table { width:100%; border-collapse:collapse; }
  th { text-align:left; font-size:11px; text-transform:uppercase; letter-spacing:.5px; color:var(--muted);
       padding:9px 14px; border-bottom:1px solid var(--line); }
  td { padding:10px 14px; border-bottom:1px solid var(--line); vertical-align:middle; }
  tr.cfg td { background:#21252b; padding:14px 18px 16px 46px; }
  .toggle { width:24px; height:24px; border:1px solid var(--line); background:#2d333d; color:var(--accent);
            border-radius:5px; font-size:16px; cursor:pointer; line-height:1; }
  .name { font-weight:600; } .sub { color:var(--muted); font-size:12px; }
  .en { text-align:center; width:80px; }
  input[type=checkbox] { width:18px; height:18px; cursor:pointer; accent-color:var(--ok); }
  .knob { display:flex; align-items:center; gap:10px; margin:6px 0; }
  .knob span { color:var(--muted); min-width:150px; font:13px ui-monospace,monospace; }
  input.f, select.f { background:#2d333d; color:var(--text); border:1px solid var(--line); border-radius:5px; padding:5px 8px; }
  input.f { width:90px; } input.sm { width:64px; } select.f { min-width:120px; }
  .summary { color:var(--muted); font-size:12px; font-style:italic; margin-top:8px; }
  .cardhead { display:flex; align-items:center; gap:10px; padding:11px 14px; cursor:pointer; font-weight:600; }
  .icwrap { max-height:340px; overflow:auto; }
  .ic td, .ic th { padding:7px 10px; font-size:13px; white-space:nowrap; }
  .role { font-size:11px; color:var(--muted); text-transform:uppercase; }
  footer { padding:12px 18px; border-top:1px solid var(--line); display:flex; align-items:center; gap:14px; }
  #save { background:var(--accent); color:#fff; border:none; padding:10px 22px; border-radius:6px; font-size:14px;
          font-weight:600; cursor:pointer; } #save:disabled { opacity:.5; cursor:default; }
  #result { font-size:13px; }
</style>
</head>
<body>
<header><h1>Optimus9 · Strategy</h1><span id="status">loading…</span></header>
<div class="wrap">
  <div class="left">
    <div class="card">
      <table><thead><tr><th style="width:34px"></th><th>Producer</th><th class="en">Enabled</th></tr></thead>
      <tbody id="grid"></tbody></table>
    </div>
    <div class="card">
      <div class="cardhead" onclick="toggleIc()"><button class="toggle" id="ictg">+</button>Line configs (ic)</div>
      <div id="icbody" style="display:none"></div>
    </div>
  </div>
  <div class="right">
    <label>Notes (persistent)</label>
    <textarea id="notes" placeholder="dialing notes…"></textarea>
  </div>
</div>
<footer><button id="save" onclick="saveAndUpdate()">Save &amp; update</button><span id="result"></span></footer>

<script>
let producers = [], icMods = [], icModes = [];

async function load() {
  producers = await (await fetch('/api/producers')).json();
  const ic = await (await fetch('/api/ic_mods')).json(); icMods = ic.rows; icModes = ic.modes;
  document.getElementById('notes').value = (await (await fetch('/api/notes')).json()).text || '';
  renderGrid(); renderIc();
  document.getElementById('status').textContent = producers.length + ' modules · ' + icMods.length + ' lines';
}

function renderGrid() {
  const g = document.getElementById('grid'); g.innerHTML = '';
  producers.forEach((p, i) => {
    const row = g.insertRow();
    row.innerHTML = `<td><button class="toggle" id="tg${i}" onclick="toggle(${i})">+</button></td>
      <td><div class="name">${p.label}</div><div class="sub">${p.name}</div></td>
      <td class="en"><input type="checkbox" ${p.active ? 'checked' : ''} onchange="producers[${i}].active=this.checked"></td>`;
    const cfg = g.insertRow(); cfg.className = 'cfg'; cfg.id = 'cfg' + i; cfg.style.display = 'none';
    cfg.innerHTML = `<td colspan="3">${detailHtml(p, i)}</td>`;
  });
}

function lineOptions(lines, sel) {
  return lines.map(l => `<option value="${l.ic_pk}" ${l.ic_pk == sel ? 'selected' : ''}>${l.nm}</option>`).join('');
}

function detailHtml(p, i) {
  const d = p.detail;
  if (d.kind === 'cascade') {
    const knobs = (d.knobs || []).map((k, j) =>
      `<label class="knob" title="${(k.note || '').replace(/"/g, '&quot;')}"><span>${k.name.replace('lp_lr_', '').replace('lp_', '')}</span>
        <input class="f sm" value="${k.val}" onchange="producers[${i}].detail.knobs[${j}].val=+this.value"></label>`).join('');
    const grows = (d.gates || []).map((g, j) => `<tr>
      <td class="en"><input type="checkbox" ${g.active ? 'checked' : ''} onchange="producers[${i}].detail.gates[${j}].active=this.checked"></td>
      <td>${g.role}</td>
      <td><span class="name">${g.name}</span></td>
      <td class="sub">${g.lines.map(l => l.nm + '(' + l.check + ')').join(' · ')}</td>
      <td><select class="f" onchange="producers[${i}].detail.gates[${j}].op=this.value">
        <option ${g.op === 'AND' ? 'selected' : ''}>AND</option><option ${g.op === 'OR' ? 'selected' : ''}>OR</option></select></td></tr>`).join('');
    return `<div class="knobs">${knobs}</div>
      <table class="ic"><thead><tr><th class="en">On</th><th>role</th><th>gate</th><th>lines (check)</th><th>op</th></tr></thead><tbody>${grows}</tbody></table>
      <div class="summary">latch-release: arm → wobslay reversal → finisher (gated by bias). Tick a finisher (e.g. s15a) to add it, tune the knobs, then Save &amp; update</div>`;
  }
  if (d.kind === 'bl_state') {
    let rows = d.bl_lines.map((bl, j) => {
      const sup = bl.role === 'breach'
        ? `<select class="f" onchange="producers[${i}].detail.bl_lines[${j}].support_ic=+this.value || null">
             <option value="">—</option>${lineOptions(d.lines, bl.support_ic)}</select>`
        : '<span class="sub">—</span>';
      return `<tr><td><input type="checkbox" ${bl.active ? 'checked' : ''}
                  onchange="producers[${i}].detail.bl_lines[${j}].active=this.checked"></td>
        <td><span class="name">${bl.nm}</span> <span class="role">${bl.role}</span></td><td>${sup}</td></tr>`;
    }).join('');
    return `<table class="ic"><thead><tr><th class="en">On</th><th>BL line</th><th>Support line</th></tr></thead>
      <tbody>${rows}</tbody></table><div class="summary">active lines on top</div>`;
  }
  if (d.kind === 'lp') {
    const k = d.lp.map((c, j) => `<div class="knob"><span>${c.key}</span>
      <input class="f" value="${c.value ?? ''}" onchange="producers[${i}].detail.lp[${j}].value=this.value"></div>`).join('');
    return k + `<div class="summary">${d.summary}</div>`;
  }
  return `<div class="summary">${d.summary}</div>`;
}

function modeOptions(sel) {
  return icModes.map(m => `<option value="${m.ivm_pk}" ${m.ivm_pk == sel ? 'selected' : ''}>${m.ivm_label}</option>`).join('');
}

function renderIc() {
  const cols = [['ic_src', 'src', 'f'], ['ic_bb_len', 'bb_len', 'sm'], ['ic_bb_mult', 'bb_mult', 'sm'],
                ['ic_k_len', 'k_len', 'sm'], ['ic_rsi_len', 'rsi_len', 'sm'], ['ic_stc_len', 'stc_len', 'sm']];
  let h = `<div class="icwrap"><table class="ic"><thead><tr><th>line</th><th>type</th><th>value_mode</th><th>wobble</th>` +
          cols.map(c => `<th>${c[1]}</th>`).join('') + `</tr></thead><tbody>`;
  icMods.forEach((r, i) => {
    h += `<tr><td><span class="name">${r.nm}</span></td><td class="role">${r.ic_line_type}</td>
      <td><select class="f" onchange="icMods[${i}].ic_ivm_pk=+this.value">${modeOptions(r.ic_ivm_pk)}</select></td>
      <td><input class="f sm" value="${r.ic_wobble ?? ''}" onchange="icMods[${i}].ic_wobble=this.value"></td>` +
      cols.map(c => `<td><input class="f ${c[2]}" value="${r[c[0]] ?? ''}" onchange="icMods[${i}].${c[0]}=this.value"></td>`).join('') +
      `</tr>`;
  });
  document.getElementById('icbody').innerHTML = h + `</tbody></table></div>`;
}

function toggle(i) {
  const cfg = document.getElementById('cfg' + i), btn = document.getElementById('tg' + i);
  const open = cfg.style.display === 'none'; cfg.style.display = open ? 'table-row' : 'none'; btn.textContent = open ? '−' : '+';
}
function toggleIc() {
  const b = document.getElementById('icbody'), btn = document.getElementById('ictg');
  const open = b.style.display === 'none'; b.style.display = open ? 'block' : 'none'; btn.textContent = open ? '−' : '+';
}

async function saveAndUpdate() {
  const btn = document.getElementById('save'), res = document.getElementById('result');
  btn.disabled = true; res.style.color = 'var(--muted)'; res.textContent = 'saving + running strat_review…';
  try {
    const r = await (await fetch('/api/save', {
      method: 'POST', headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ producers, ic_mods: icMods, notes: document.getElementById('notes').value })
    })).json();
    res.style.color = 'var(--ok)'; res.textContent = `strat_review updated — ${r.rows} rows · ${JSON.stringify(r.counts)}`;
  } catch (e) { res.style.color = '#d65e5e'; res.textContent = 'error: ' + e; }
  btn.disabled = false;
}

load();
</script>
</body>
</html>
